name: "Bitácora digital "
description: "Datos generales de equipo que esta ingresando"
body:
- type: input
  id: serie
  attributes:
    label: Número de serie
    description: "Ingresar el número de serie"
    placeholder: "serial no"
  validations:
    required: true
- type: input
  id: prevalence
  attributes:
    label: Bug prevalence
    description: "How often do you or others encounter this bug?"
    placeholder: "Whenever I visit the user account page (1-2 times a week)"
  validations:
    required: true
