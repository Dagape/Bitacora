name: "Bitácora digital "
description: "Datos generales de equipo que esta ingresando"
body:
- type: input
  id: serie
  attributes:
    label: Número de serie
    description: "Ingresar el número de serie"
    placeholder: "serial no"
  validations:
    required: true  
- type: input
  id: prevalence
  attributes:
    label: Origen de equipo a revisar
    description: "Descripción de su area de adscripción"
    placeholder: "Zona, region o área"
  validations:
    required: true
- type: input
  id: modelo
  attributes:
    label: Marca / modelo
    description: "Ingrese la marca y modelo del equipo"
    placeholder: "Epson 211, Xerox, HP 1200 , etc"
  validations:
    required: true
- type: input
  id: usuario
  attributes:
    label: Nombre de usuario 
    description: "Nombre de persona que entrega el equipo"
    placeholder: "Ingrese también numero de celular o no extensión telefonica "
  validations:
    required: true
- type: checkboxes
  id: Problema o sintoma detectado
  attributes:
    label: Qué presenta el equipo al momento de falla?
    description: Seleccione una o varias opciones segun corresponda
    options:
      - label: No imprime
        required: true
      - label: Ruido al interior del equipo
      - label: Atora hoja de papel
      - label: Código de error en pantalla o luces led parpadeando
      - Label: Contiene toner y tambor nuevo
