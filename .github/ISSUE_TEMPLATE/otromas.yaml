name: "Bitácora digital "
description: "Datos generales de equipo que esta ingresando"
body:
- type: input
  id: prevalence
  attributes:
    label: "Número de serie"
    description: "Escribe el número de serie"
    placeholder: "Número de serie"
  validations:
    required: true
- type: textarea
  id: repro
  attributes:
    label: Reproduction steps
    description: "How do you trigger this bug? Please walk us through it step by step."
    value: |
      1.
      2.
      3.
      ...
    render: bash
  validations:
    required: true
- type: dropdown
  id: download
  attributes:
    label: How did you download the software?
    options:
      - Homebrew
      - MacPorts
      - apt-get
      - Built from source
  validations:
    required: true
- type: checkboxes
  id: cat-preferences
  attributes:
    label: What kinds of cats do you like?
    description: You may select more than one.
    options:
      - label: Orange cat (required. Everyone likes orange cats.)
        required: true
      - label: Black cat
      - label: negro
      - label: Verde
      - Label: Amarillo

     
       
